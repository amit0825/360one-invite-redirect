<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening 360 ONE Wealth</title>

  <!-- Social meta tags -->
  <meta property="og:title" content="Join 360 ONE Wealth" />
  <meta property="og:description" content="Manage your family's investments and insurance in one place." />
  <meta property="og:image" content="https://invite.360one.com/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Join 360 ONE Wealth">
  <meta name="twitter:description" content="Premium wealth management for your family.">
  <meta name="twitter:image" content="https://invite.360one.com/logo.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .logo {
      width: 90px;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 22px;
      color: #111;
      margin-bottom: 10px;
    }

    p {
      color: #777;
      font-size: 15px;
      margin-bottom: 40px;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff7a00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    .fallback-btn {
      display: none;
      margin-top: 32px;
      padding: 14px 28px;
      background: #ff7a00;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    @keyframes spin {
      0%  { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    (function () {
      const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.one360.wealth";
      const APP_STORE  = "https://apps.apple.com/in/app/360-one-wealth-the-reserve/id6751482235";

      function getMobileOS() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        if (/android/i.test(ua)) return "android";
        if (/iPad|iPhone|iPod/.test(ua)) return "ios";
        return "other";
      }

      function showFallbackButton(storeUrl) {
        var btn = document.getElementById("fallback-btn");
        if (btn) {
          btn.href = storeUrl;
          btn.style.display = "inline-block";
        }
        var loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      }

      function openApp() {
        var os = getMobileOS();

        // The App Link URL — must be a path that matches your manifest's pathPrefix (/invite)
        // We use the current full URL so that /invite/XYZ is passed through correctly
        var appLinkUrl = window.location.href;

        if (os === "android") {
          // Android App Links: navigate to the https URL directly.
          // The OS intercepts it and opens the app IF:
          //   1. assetlinks.json is verified
          //   2. The path matches the manifest intent-filter (/invite/...)
          // If the user lands on this page NOT via an /invite/* path,
          // App Links won't trigger — that's expected behaviour.

          // We attempt the App Link by creating a hidden iframe first.
          // This avoids adding a history entry and prevents the page from
          // visually reloading, while still firing the intent on Android.
          var iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = appLinkUrl;
          document.body.appendChild(iframe);

          // Fallback: if app not installed or not opened after 2.5s, go to Play Store
          var fallbackTimer = setTimeout(function () {
            document.body.removeChild(iframe);
            showFallbackButton(PLAY_STORE);
          }, 2500);

          // If the page goes to background (app opened), cancel the fallback
          document.addEventListener("visibilitychange", function onVisChange() {
            if (document.hidden) {
              clearTimeout(fallbackTimer);
              document.removeEventListener("visibilitychange", onVisChange);
            }
          });

        } else if (os === "ios") {
          // iOS Universal Links are triggered automatically when the browser
          // navigates to a URL that matches your AASA file.
          // We just set a fallback timer in case the app isn't installed.
          setTimeout(function () {
            showFallbackButton(APP_STORE);
          }, 2500);

        } else {
          // Desktop: just show the Play Store button
          showFallbackButton(PLAY_STORE);
        }
      }

      window.addEventListener("load", function () {
        setTimeout(openApp, 500);
      });
    })();
  </script>
</head>

<body>
  <img class="logo" src="/logo.png" alt="360 ONE Wealth" />
  <h2>Opening 360 ONE Wealth</h2>
  <p>Please wait while we redirect you…</p>
  <div class="loader" id="loader"></div>
  <a class="fallback-btn" id="fallback-btn" href="#">Open in App Store</a>
</body>

</html>
