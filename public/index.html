<script>
  (function () {
  
    const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.one360.wealth";
    const APP_STORE = "https://apps.apple.com/in/app/360-one-wealth-the-reserve/id6751482235";
  
    function getMobileOS() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
  
      if (/android/i.test(userAgent)) return "android";
      if (/iPad|iPhone|iPod/.test(userAgent)) return "ios";
  
      return "other";
    }
  
    function getMobileFromPath() {
      const path = window.location.pathname.split("/");
      return path[path.length - 1] || "";
    }
  
    function redirect() {
  
      // 🔥 ADD IT HERE (VERY IMPORTANT)
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) return;
  
      const os = getMobileOS();
      const mobile = getMobileFromPath();
  
      const deepLink = `360-one-wealth-the-reserve://invite/${mobile}`;
  
      const start = Date.now();
  
      window.location.replace(deepLink);
  
      setTimeout(function () {
        const end = Date.now();
  
        if (end - start < 2000) {
          if (os === "android") {
            window.location.replace(PLAY_STORE);
          } else if (os === "ios") {
            window.location.replace(APP_STORE);
          }
        }
      }, 1200);
    }
  
    redirect();
  
  })();
  </script>
