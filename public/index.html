<script>
(function () {

  const PLAY_STORE = "https://play.google.com/store/apps/details?id=com.one360.wealth";
  const APP_STORE = "https://apps.apple.com/in/app/360-one-wealth-the-reserve/id6751482235";

  function redirect() {

    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua);
    const isAndroid = /android/i.test(ua);

    // 🤖 ANDROID → let App Links handle it
    if (isAndroid) {

      // If app not installed → fallback to Play Store
      setTimeout(() => {
        window.location.replace(PLAY_STORE);
      }, 1500);

      return;
    }

    // 🍏 iOS → let Universal Links handle it
    if (isIOS) {

      // If app not installed → fallback to App Store
      setTimeout(() => {
        window.location.replace(APP_STORE);
      }, 2000);

      return;
    }

    // 🌐 Desktop / others → optional (send to stores)
    setTimeout(() => {
      window.location.replace(PLAY_STORE);
    }, 1500);

  }

  redirect();

})();
</script>
